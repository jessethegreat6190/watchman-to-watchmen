<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Boards | Watchmen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <h1><img src="Logo/logo.jpeg" alt="Watchmen Logo" style="height: 40px; border-radius: 8px;"> Watchmen</h1>
    <div class="nav-links">
      <a href="index.html">Gallery</a>
      <a id="boards-link" href="boards.html" class="active">Boards</a>
      <a id="upload-link" href="upload.html" style="display: none;">Upload</a>
      <a id="admin-link" href="admin.html" style="display: none;">Admin</a>
      <div id="user-status"></div>
      <button id="auth-toggle" class="btn-primary" onclick="toggleAuth()">Login</button>
    </div>
  </nav>

  <div class="container">
    <div class="header-actions" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h2 style="font-size: 2rem; font-weight: 800; color: #fff;">My Boards</h2>
      <button class="btn-primary" onclick="openCreateBoardModal()">+ Create Board</button>
    </div>

    <div id="boards-grid" class="gallery">
      <!-- Boards will be loaded here -->
    </div>

    <div id="empty-boards" style="display: none; text-align: center; padding: 5rem 1rem; background: #1e293b; border-radius: 20px; border: 1px dashed rgba(255, 255, 255, 0.1);">
      <h3 style="color: #fff; margin-bottom: 1rem;">No boards yet</h3>
      <p style="color: #94a3b8; margin-bottom: 2rem;">Create boards to organize your inspirations.</p>
      <button class="btn-primary" onclick="openCreateBoardModal()">Create Your First Board</button>
    </div>
  </div>

  <!-- Create Board Modal -->
  <div id="board-modal" class="modal-overlay" style="display: none;">
    <div class="auth-container" style="max-width: 500px;">
      <h2 style="margin-bottom: 1.5rem;">Create New Board</h2>
      <div class="form-group">
        <input type="text" id="board-name" placeholder=" ">
        <label for="board-name">Board Name</label>
      </div>
      <div class="form-group">
        <textarea id="board-description" placeholder=" " style="min-height: 100px;"></textarea>
        <label for="board-description">Description (Optional)</label>
      </div>
      <div style="display: flex; gap: 1rem; margin-top: 1rem;">
        <button class="btn-primary" style="flex: 1;" onclick="saveBoard()">Create Board</button>
        <button class="modal-close-btn" style="flex: 1; margin: 0;" onclick="closeBoardModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Board Details Modal (View Pins in Board) -->
  <div id="board-details-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="width: 95%; max-width: 1200px; max-height: 90vh; overflow-y: auto;">
      <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem;">
        <div>
          <h2 id="modal-board-name" style="font-size: 2rem; margin-bottom: 0.5rem;"></h2>
          <p id="modal-board-description" style="color: #94a3b8;"></p>
        </div>
        <button class="modal-close-btn" onclick="closeBoardDetailsModal()">✕</button>
      </div>
      <div id="board-pins-grid" class="gallery"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/boards.js"></script>
</body>
</html>
