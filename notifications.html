<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications | Watchmen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <h1><img src="Logo/logo.jpeg" alt="Watchmen Logo" style="height: 40px; border-radius: 8px;"> Watchmen</h1>
    <div class="nav-links">
      <a href="index.html">Gallery</a>
      <a id="boards-link" href="boards.html" style="display: none;">Boards</a>
      <a id="upload-link" href="upload.html" style="display: none;">Upload</a>
      <a id="admin-link" href="admin.html" style="display: none;">Admin</a>
      <div id="user-status"></div>
      <button id="auth-toggle" class="btn-primary" onclick="toggleAuth()">Login</button>
    </div>
  </nav>

  <div class="container" style="max-width: 800px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h2 style="font-size: 2rem; font-weight: 800; color: #fff;">Notifications</h2>
      <button class="btn-primary" style="background: #334155;" onclick="markAllAsRead()">Mark all as read</button>
    </div>

    <div id="notifications-list" style="display: flex; flex-direction: column; gap: 1rem;">
      <!-- Notifications will load here -->
    </div>

    <div id="empty-notifications" style="display: none; text-align: center; padding: 5rem 1rem;">
      <p style="color: #94a3b8; font-size: 1.125rem;">You're all caught up!</p>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/notifications.js"></script>
</body>
</html>
